
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Agentic Candy Machine</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Oxanium:wght@400;600;700;800&family=IBM+Plex+Mono:wght@300;400;500;600&family=Chakra+Petch:wght@400;600;700&display=swap" rel="stylesheet">
  <style>
    body {
      background-color: #06060e;
      color: #e8e6f0;
      margin: 0;
      font-family: 'IBM Plex Mono', monospace;
    }
    .font-display { font-family: 'Oxanium', sans-serif; }
    .font-accent { font-family: 'Chakra Petch', sans-serif; }
    
    ::-webkit-scrollbar { width: 4px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: rgba(153, 69, 255, 0.2); border-radius: 4px; }
    ::-webkit-scrollbar-thumb:hover { background: rgba(153, 69, 255, 0.5); }

    @keyframes drift { 
      0% { transform: translate(0,0) scale(1); } 
      50% { transform: translate(30px,-20px) scale(1.1); } 
      100% { transform: translate(0,0) scale(1); } 
    }
    @keyframes glowPulse { 
      0%, 100% { box-shadow: 0 0 20px rgba(153, 69, 255, 0.15); } 
      50% { box-shadow: 0 0 40px rgba(153, 69, 255, 0.3), 0 0 80px rgba(20, 241, 149, 0.1); } 
    }
    @keyframes scanline {
      0% { top: -2px; }
      100% { top: 100%; }
    }
  </style>
