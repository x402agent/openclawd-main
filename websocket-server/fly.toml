app = "clawd-ws"
primary_region = "iad"

[build]

[env]
  PORT = "3099"
  NODE_ENV = "production"
  ENABLE_CLAIMS = "true"
  CLAIM_POLL_INTERVAL = "15000"
  HELIUS_NETWORK = "mainnet"
  # SOLANA_RPC_URL, SOLANA_RPC_WS, HELIUS_* keys are set via `flyctl secrets set`

[http_service]
  internal_port = 3099
  force_https = true
  auto_stop_machines = "off"
  auto_start_machines = true
  min_machines_running = 1
  processes = ["app"]

  [http_service.concurrency]
    type = "connections"
    hard_limit = 1000
    soft_limit = 800

[[http_service.checks]]
  grace_period = "15s"
  interval = "30s"
  method = "GET"
  timeout = "5s"
  path = "/health"

[[vm]]
  memory = "256mb"
  cpu_kind = "shared"
  cpus = 1
