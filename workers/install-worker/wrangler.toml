name = "solanaclawd-install"
main = "src/index.ts"
compatibility_date = "2025-11-01"

# Bind this worker to the install.sh route on solanaclawd.com.
# Requires the zone "solanaclawd.com" to be in the same Cloudflare account.
routes = [
  { pattern = "solanaclawd.com/install.sh", zone_name = "solanaclawd.com" },
  { pattern = "solanaclawd.com/install",    zone_name = "solanaclawd.com" },
]
