name: OSS Readiness

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  release-hygiene:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc

      - name: Doctor
        run: npm run doctor

      - name: Branding check
        run: npm run brand:check

      - name: Public release checks
        run: npm run release:check
